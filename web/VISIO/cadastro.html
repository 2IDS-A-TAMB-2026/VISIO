<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <title>Cadastro — VISIO</title>
</head>

<body>
    <header>
        <nav>
            <img src="images/LogoDark.png" class="logo" alt="Logo VISIO">
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Início</a></li>
                <li><a href="sobre.html"><i class="fa-solid fa-info-circle"></i> Sobre Nós</a></li>
                <li><a href="contato.html"><i class="fa-solid fa-address-book"></i> Contato</a></li>
                <li><a href="questoes.html"><i class="fa-solid fa-right-to-bracket"></i> Questões</a></li>
                <li><a href="sensores.html"><i class="fa-solid fa-microchip"></i> Sensores</a></li>
                <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
            </ul>
        </nav>
    </header>
    <main class="signup-page">
        <div class="signup-container">
            <div class="signup-form">
                <h1>Crie sua conta</h1>
                <p>Cadastre-se para acessar todas as funcionalidades da plataforma VISIO.</p>
                <form action="api/usuarios.php" method="POST" id="form">

                    <input type="text" name="cpf" id="cpf" placeholder="CPF">
                    <span class="erro" id="erroCpf"></span>

                    <input type="email" name="email" id="email" placeholder="Email">
                    <span class="erro" id="erroEmail"></span>

                    <input type="text" name="data_nascimento" id="data_nascimento" placeholder="Data de nascimento">
                    <span class="erro" id="erroDataNascimento"></span>

                    <input type="tel" name="telefone" id="telefone" placeholder="Telefone">
                    <span class="erro" id="erroTelefone"></span>

                    <input type="password" name="senha" id="senha" placeholder="Senha">
                    <span class="erro" id="erroSenha"></span>

                    <input type="password" name="confirmar_senha" id="confirmar_senha" placeholder="Confirmar senha">
                    <span class="erro" id="erroConfirmarSenha"></span>

                    <button type="submit">
                        <i class="fa-solid fa-user-plus"></i>&nbsp;&nbsp;Cadastrar
                    </button>

                </form>
                <div class="signup-footer">
                    <p>Já tem conta? <a href="login.html">Entrar</a></p>
                </div>
            </div>
            <div class="signup-image">
                <img src="images/SquareDark.png" alt="Ilustração representando criação de conta na plataforma VISIO">
            </div>
        </div>
    </main>
    <footer>
        &copy; 2026 VISIO – Visão Inteligente para Sensores IoT.
    </footer>
    <script src="JS/validacaocadastro.js"></script>
</body>

</html>
