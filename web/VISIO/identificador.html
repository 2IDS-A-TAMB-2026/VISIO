    <main class="home">
        <h1>Identificação de Dispositivos via Câmera</h1>
        <section id="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="camera-overlay">
                <i class="fa-solid fa-camera"></i>
                <p>Posicione o dispositivo na área da câmera</p>
            </div>
        </section>
        <section id="result" aria-live="polite">
            Aguardando identificação...
        </section>
    </main>
    <footer class="footer_identificador">&copy; 2026 VISIO – Visão Inteligente para Sensores IoT.</footer>
    <script>
        async function startCamera() {
            const video = document.getElementById('video');
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Seu navegador não suporta acesso à câmera.");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment" // usa câmera traseira no celular
                    }
                });
                video.srcObject = stream;
            } catch (error) {
                alert('Erro ao acessar a câmera: ' + error.message);
            }
        }
        startCamera();
        // Exemplo de identificação simulada

    </script>
